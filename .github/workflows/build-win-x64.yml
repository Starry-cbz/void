name: Build Void Windows x64 (System Setup)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  preflight:
    name: Preflight (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout (main)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            build/package-lock.json
            extensions/package-lock.json
            remote/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps (kerberos)
        run: |
          sudo apt-get update
          sudo apt-get install -y libkrb5-dev pkg-config

      - name: Install system deps (x11)
        run: sudo apt-get install -y libx11-dev libxkbfile-dev

      - name: Install dependencies
        run: npm ci
        env:
          npm_config_foreground_scripts: "true"
          npm_config_build_from_source: "false"
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

      - name: Build Void React
        run: npm run buildreact

  build_void_win_x64:
    name: Build Void (win x64 system setup)
    needs: preflight
    runs-on: windows-latest
    timeout-minutes: 360
    steps:
      - name: Checkout (main)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            build/package-lock.json
            extensions/package-lock.json
            remote/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm ci
        env:
          npm_config_arch: x64
          npm_config_foreground_scripts: "true"
          npm_config_build_from_source: "false"
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

      - name: Build Void React
        run: npm run buildreact

      - name: Build Void (win32-x64 fast)
        run: npm run gulp "vscode-win32-x64"

      - name: Build Void installer (system)
        run: npm run gulp "vscode-win32-x64-system-setup"

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ".build\artifacts" | Out-Null
          Copy-Item ".build\win32-x64\system-setup\VSCodeSetup.exe" ".build\artifacts\Void-win32-x64-system-setup.exe" -Force

      - name: Upload artifacts (Void)
        uses: actions/upload-artifact@v4
        with:
          name: void-win-x64-system-setup
          path: .build/artifacts/*
          if-no-files-found: error
